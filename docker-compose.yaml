version: '3.8'

services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_DB: event
      POSTGRES_PASSWORD: major2025
    ports:
      - "5432:5432"
    restart: always

  adminer:
    image: adminer:latest
    restart: always
    ports:
      - 8888:8080

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command:
      - start-dev
      - --db=dev-file
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "9090:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
      - keycloak
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://dpg-d1jtjbumcj7s73abr660-a.frankfurt-postgres.render.com:5432/event_r0xw
      SPRING_DATASOURCE_USERNAME: event_r0xw_user
      SPRING_DATASOURCE_PASSWORD: 1ft2lqUJSepx863hKbzJbR3GGqprLcFb
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/event-platform

volumes:
  keycloak-data:
    driver: local
